<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="color-scheme" content="dark">
<title>Habits</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000000;
  --bg-card: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.14);
  --text-1: #FAFAFA;
  --text-2: rgba(255,255,255,0.55);
  --text-3: rgba(255,255,255,0.35);
  --text-4: rgba(255,255,255,0.18);
  --font: 'Share Tech Mono', monospace;
  --radius: 14px;
  --accent: #F97316;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg); color: var(--text-1);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
.shell { max-width: 680px; margin: 0 auto; padding: 20px 16px 110px; }

/* Page header */
.page-header { margin-bottom: 20px; }
.page-title { font-size: 22px; font-weight: 700; letter-spacing: 0.08em; }
.page-title-dot { color: rgba(255,255,255,0.25); }
.page-sub { font-size: 10px; color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px; }

/* Habit selector row */
.selector-wrap {
  display: flex; align-items: center; gap: 10px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; padding-bottom: 2px; margin-bottom: 22px;
}
.selector-wrap::-webkit-scrollbar { display: none; }
.habit-circle {
  flex-shrink: 0; width: 46px; height: 46px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; letter-spacing: 0.05em;
  cursor: pointer; border: 2px solid transparent;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.12s, box-shadow 0.15s, border-color 0.15s;
  position: relative; user-select: none; -webkit-user-select: none;
}
.habit-circle:active { transform: scale(0.9); }
.habit-circle.active {
  border-color: rgba(255,255,255,0.6);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.1);
}
.add-circle {
  flex-shrink: 0; width: 46px; height: 46px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: 1.5px dashed var(--border-strong);
  color: var(--text-3); font-size: 20px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, color 0.15s;
}
.add-circle:hover { background: var(--bg-card); color: var(--text-1); }

/* Habit detail header */
.detail-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.detail-name {
  font-size: 16px; font-weight: 700; letter-spacing: 0.08em;
  color: var(--text-1);
}
.detail-edit-btn {
  background: none; border: none; color: var(--text-3);
  font-family: var(--font); font-size: 20px; line-height: 1;
  cursor: pointer; padding: 2px 4px;
  -webkit-tap-highlight-color: transparent; transition: color 0.12s;
}
.detail-edit-btn:hover { color: var(--text-1); }

/* Year card */
.year-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 14px 16px;
  margin-bottom: 12px; overflow: hidden;
}
.year-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.year-nav-btn {
  background: none; border: none; color: var(--text-2);
  font-family: var(--font); font-size: 22px; line-height: 1;
  cursor: pointer; padding: 0 6px;
  -webkit-tap-highlight-color: transparent; transition: color 0.12s;
}
.year-nav-btn:hover { color: var(--text-1); }
.year-label {
  font-size: 13px; font-weight: 700; letter-spacing: 0.14em;
  color: var(--text-1); text-transform: uppercase;
}
.year-grid-wrap { position: relative; }
.year-month-row {
  position: relative; height: 14px; margin-bottom: 5px;
}
.year-month-lbl {
  position: absolute; top: 0;
  font-size: 9px; letter-spacing: 0.07em;
  color: var(--text-3); text-transform: uppercase;
  white-space: nowrap; line-height: 14px;
}
.year-grid {
  display: grid;
  grid-template-rows: repeat(7, var(--cell, 5px));
  grid-auto-flow: column;
  grid-auto-columns: var(--cell, 5px);
  gap: var(--cgap, 2px);
}
.year-cell {
  border-radius: 1.5px;
  transition: opacity 0.1s;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.year-cell:active { opacity: 0.7; }
.year-cell.no-click { cursor: default; pointer-events: none; }

/* Stats row */
.stats-row {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-bottom: 12px;
}
.stat-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 10px;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
}
.stat-val {
  font-size: 28px; font-weight: 700; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.stat-label { font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); }

/* Chart card */
.chart-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 14px 12px;
  margin-bottom: 12px;
}
.chart-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.chart-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--text-2); }
.chart-svg-wrap { width: 100%; }
.chart-svg-wrap svg { display: block; width: 100%; }
.chart-month-row {
  display: flex; justify-content: space-between;
  margin-top: 6px;
}
.chart-month-lbl { font-size: 8px; color: var(--text-4); letter-spacing: 0.05em; }

/* Empty state */
.empty-state {
  text-align: center; padding: 60px 0;
  color: var(--text-3); font-size: 11px; letter-spacing: 0.08em; line-height: 2;
}
.empty-icon { font-size: 34px; opacity: 0.25; display: block; margin-bottom: 12px; }

/* Modal */
.modal-bg {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.78); backdrop-filter: blur(6px);
  align-items: flex-end; justify-content: center;
}
.modal-bg.show { display: flex; }
.modal {
  background: #111; border: 1px solid var(--border-strong);
  border-radius: 20px 20px 0 0; padding: 24px 20px 44px;
  width: 100%; max-width: 540px;
  max-height: 88vh; overflow-y: auto; overscroll-behavior: contain;
}
.modal-title { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-1); margin-bottom: 20px; }
.form-field { margin-bottom: 16px; }
.form-label { display: block; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); margin-bottom: 7px; }
.form-input {
  width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border-strong);
  border-radius: 10px; padding: 11px 14px; color: var(--text-1);
  font-family: var(--font); font-size: 13px;
  outline: none; -webkit-appearance: none; transition: border-color 0.15s;
}
.form-input:focus { border-color: rgba(255,255,255,0.28); }
.color-grid { display: flex; gap: 10px; flex-wrap: wrap; }
.color-swatch {
  width: 30px; height: 30px; border-radius: 50%;
  cursor: pointer; border: 2px solid transparent;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s, box-shadow 0.12s;
}
.color-swatch.selected {
  border-color: rgba(255,255,255,0.9);
  transform: scale(1.18); box-shadow: 0 0 0 3px rgba(255,255,255,0.14);
}
.modal-actions { display: flex; gap: 10px; margin-top: 6px; }
.btn-primary {
  flex: 1; background: #FAFAFA; color: #000; border: none;
  border-radius: 10px; padding: 13px; font-family: var(--font);
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; -webkit-tap-highlight-color: transparent; transition: opacity 0.12s;
}
.btn-primary:active { opacity: 0.8; }
.btn-secondary {
  flex: 1; background: rgba(255,255,255,0.06); color: var(--text-2);
  border: 1px solid var(--border); border-radius: 10px; padding: 13px;
  font-family: var(--font); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.12s;
}
.btn-secondary:active { background: rgba(255,255,255,0.1); }
.btn-danger {
  width: 100%; background: rgba(239,68,68,0.1); color: #f87171;
  border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; padding: 13px;
  font-family: var(--font); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; margin-top: 12px;
  -webkit-tap-highlight-color: transparent; transition: background 0.12s;
}
.btn-danger:active { background: rgba(239,68,68,0.2); }

/* Mark as done button */
.mark-done-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; border: none; border-radius: var(--radius);
  padding: 16px; margin-top: 4px;
  font-family: var(--font); font-size: 13px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: opacity 0.15s, transform 0.1s, background 0.2s;
}
.mark-done-btn:active { transform: scale(0.97); }
.mark-done-btn.undone {
  background: var(--habit-color, #F97316);
  color: #000;
}
.mark-done-btn.done {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--habit-color, #F97316);
  color: var(--habit-color, #F97316);
}

@media (max-width: 480px) {
  .modal { padding: 22px 16px 40px; }
}
</style>
</head>
<body>
<div class="shell">
  <div class="page-header">
    <div class="page-title">HABITS<span class="page-title-dot">.</span></div>
    <div class="page-sub" id="habitsDateSub"></div>
  </div>

  <!-- Habit selector circles -->
  <div class="selector-wrap" id="selectorWrap">
    <button class="add-circle" id="addHabitBtn" title="Add habit">+</button>
  </div>

  <!-- Empty state -->
  <div class="empty-state" id="emptyState" style="display:none">
    <span class="empty-icon">◎</span>
    NO HABITS YET<br>
    <span style="font-size:9px;color:rgba(255,255,255,0.18)">TAP + TO START TRACKING</span>
  </div>

  <!-- Detail view -->
  <div id="habitDetail" style="display:none">
    <div class="detail-head">
      <div class="detail-name" id="detailName"></div>
      <button class="detail-edit-btn" id="detailEditBtn">···</button>
    </div>

    <!-- Year card -->
    <div class="year-card">
      <div class="year-nav">
        <button class="year-nav-btn" id="prevYearBtn">&#8249;</button>
        <span class="year-label" id="yearLabel">2026</span>
        <button class="year-nav-btn" id="nextYearBtn">&#8250;</button>
      </div>
      <div class="year-grid-wrap">
        <div class="year-month-row" id="yearMonthRow"></div>
        <div class="year-grid" id="yearGrid"></div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val" id="statCompletions" style="color:var(--accent)">0</div>
        <div class="stat-label">COMPLETIONS</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="statStreak" style="color:#fbbf24">0</div>
        <div class="stat-label">STREAK</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="statBest" style="color:var(--text-2)">0</div>
        <div class="stat-label">BEST</div>
      </div>
    </div>

    <!-- Monthly chart -->
    <div class="chart-card">
      <div class="chart-head">
        <span class="chart-title">COMPLETIONS / MONTH</span>
      </div>
      <div class="chart-svg-wrap" id="chartSvgWrap"></div>
      <div class="chart-month-row" id="chartMonthRow"></div>
    </div>

    <!-- Mark as done -->
    <button class="mark-done-btn undone" id="markDoneBtn"></button>
  </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal-bg" id="habitModalBg">
  <div class="modal">
    <div class="modal-title" id="habitModalTitle">NEW HABIT</div>
    <div class="form-field">
      <label class="form-label">Name</label>
      <input class="form-input" id="habitNameInput" placeholder="e.g. Morning Run" maxlength="40" autocomplete="off">
    </div>
    <div class="form-field">
      <label class="form-label">Color</label>
      <div class="color-grid" id="colorGrid"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="habitModalCancel">Cancel</button>
      <button class="btn-primary" id="habitModalSave">Save</button>
    </div>
    <button class="btn-danger" id="habitModalDelete" style="display:none">Delete Habit</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  const COLORS = [
    '#F97316','#7DD3FC','#86EFAC','#FCA5A5',
    '#FCD34D','#C4B5FD','#F9A8D4','#6EE7B7',
    '#A5B4FC','#FDE68A'
  ];
  const MO = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const DAYS = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];

  let viewYear;
  let selectedHabitId = null;
  let editingId = null;
  let selectedColor = COLORS[0];

  // ---- Storage ----
  function loadHabits() { try { return JSON.parse(localStorage.getItem('habits_list')) || []; } catch(e) { return []; } }
  function saveHabits(h) { localStorage.setItem('habits_list', JSON.stringify(h)); }
  function loadLog() { try { return JSON.parse(localStorage.getItem('habits_log')) || {}; } catch(e) { return {}; } }
  function saveLog(l) { localStorage.setItem('habits_log', JSON.stringify(l)); }

  // ---- Date ----
  function now() { return new Date(); }
  function dkey(y, m0, d) { return y + '-' + String(m0 + 1).padStart(2,'0') + '-' + String(d).padStart(2,'0'); }

  // ---- Grid geometry ----
  function gridBounds(year) {
    const jan1 = new Date(year, 0, 1);
    const isoMon = (jan1.getDay() + 6) % 7;
    const start = new Date(year, 0, 1 - isoMon);
    const dec31 = new Date(year, 11, 31);
    const isoSun = (7 - dec31.getDay()) % 7;
    const end = new Date(year, 11, 31 + isoSun);
    const totalDays = Math.round((end - start) / 864e5) + 1;
    return { start, totalDays, numWeeks: totalDays / 7 };
  }
  function cellSize(numWeeks) {
    const w = Math.min(window.innerWidth, 680) - 32 - 28;
    const gap = 2;
    return Math.max(3, Math.floor((w - (numWeeks - 1) * gap) / numWeeks));
  }

  // ---- Stats ----
  function calcStreak(id, log) {
    const d = new Date(); d.setHours(0,0,0,0);
    if (!(log[dkey(d.getFullYear(), d.getMonth(), d.getDate())] || []).includes(id)) {
      d.setDate(d.getDate() - 1);
    }
    let s = 0;
    for (let i = 0; i < 730; i++) {
      if (!(log[dkey(d.getFullYear(), d.getMonth(), d.getDate())] || []).includes(id)) break;
      s++;
      d.setDate(d.getDate() - 1);
    }
    return s;
  }
  function calcBestStreak(id, log) {
    const keys = Object.keys(log).filter(k => (log[k] || []).includes(id)).sort();
    let best = 0, cur = 0, prev = null;
    for (const k of keys) {
      const d = new Date(k + 'T00:00:00');
      if (prev) {
        const diff = Math.round((d - prev) / 864e5);
        cur = diff === 1 ? cur + 1 : 1;
      } else { cur = 1; }
      best = Math.max(best, cur);
      prev = d;
    }
    return best;
  }
  function calcYearCompletions(id, log, year) {
    let n = 0;
    for (let m = 0; m < 12; m++) {
      const days = new Date(year, m + 1, 0).getDate();
      for (let d = 1; d <= days; d++) {
        if ((log[dkey(year, m, d)] || []).includes(id)) n++;
      }
    }
    return n;
  }
  function calcMonthlyData(id, log, year) {
    const t = now();
    return Array.from({length: 12}, (_, m) => {
      const isFutureMo = year > t.getFullYear() || (year === t.getFullYear() && m > t.getMonth());
      if (isFutureMo) return null;
      const days = new Date(year, m + 1, 0).getDate();
      const maxDay = (year === t.getFullYear() && m === t.getMonth()) ? t.getDate() : days;
      let n = 0;
      for (let d = 1; d <= maxDay; d++) {
        if ((log[dkey(year, m, d)] || []).includes(id)) n++;
      }
      return n;
    });
  }

  // ---- Toggle ----
  function toggleCell(id, date) {
    const log = loadLog();
    const k = dkey(date.getFullYear(), date.getMonth(), date.getDate());
    const arr = (log[k] || []).slice();
    const i = arr.indexOf(id);
    if (i >= 0) arr.splice(i, 1); else arr.push(id);
    if (arr.length) log[k] = arr; else delete log[k];
    saveLog(log);
    renderDetail();
  }

  // ---- Render ----
  function render() {
    const t = now();
    const sub = document.getElementById('habitsDateSub');
    if (sub) sub.textContent = DAYS[t.getDay()] + ' · ' + String(t.getDate()).padStart(2,'0') + ' ' + MO[t.getMonth()] + ' ' + t.getFullYear();

    const habits = loadHabits();
    renderSelector(habits);

    if (habits.length === 0) {
      document.getElementById('emptyState').style.display = '';
      document.getElementById('habitDetail').style.display = 'none';
      return;
    }
    document.getElementById('emptyState').style.display = 'none';

    if (!selectedHabitId || !habits.find(h => h.id === selectedHabitId)) {
      selectedHabitId = habits[0].id;
    }
    renderDetail();
  }

  function renderSelector(habits) {
    const wrap = document.getElementById('selectorWrap');
    const addBtn = document.getElementById('addHabitBtn');
    wrap.innerHTML = '';
    habits.forEach(h => {
      const btn = document.createElement('button');
      btn.className = 'habit-circle' + (h.id === selectedHabitId ? ' active' : '');
      btn.title = h.name;
      btn.style.background = h.color + '28';
      btn.style.borderColor = h.id === selectedHabitId ? h.color : 'transparent';
      btn.style.boxShadow = h.id === selectedHabitId ? `0 0 0 3px ${h.color}22` : 'none';
      btn.style.color = h.color;
      btn.textContent = h.name.slice(0,2).toUpperCase();
      btn.addEventListener('click', () => { selectedHabitId = h.id; render(); });
      wrap.appendChild(btn);
    });
    wrap.appendChild(addBtn);
  }

  function renderDetail() {
    const habits = loadHabits();
    const habit = habits.find(h => h.id === selectedHabitId);
    if (!habit) return;
    const log = loadLog();

    document.getElementById('habitDetail').style.display = '';
    document.getElementById('detailName').textContent = habit.name.toUpperCase();
    document.getElementById('detailEditBtn').onclick = () => openEdit(habit);

    document.getElementById('yearLabel').textContent = viewYear;

    renderYearGrid(habit, log);
    renderStats(habit, log);
    renderChart(habit, log);
    renderMarkDoneBtn(habit, log);
  }

  function renderMarkDoneBtn(habit, log) {
    const btn = document.getElementById('markDoneBtn');
    if (!btn) return;
    const t = now();
    const k = dkey(t.getFullYear(), t.getMonth(), t.getDate());
    const isDone = (log[k] || []).includes(habit.id);
    btn.style.setProperty('--habit-color', habit.color);
    btn.className = 'mark-done-btn ' + (isDone ? 'done' : 'undone');
    btn.textContent = isDone ? '✓  DONE TODAY' : 'MARK AS DONE';
  }

  function renderYearGrid(habit, log) {
    const { start, totalDays, numWeeks } = gridBounds(viewYear);
    const cs = cellSize(numWeeks);
    const gap = 2;
    const grid = document.getElementById('yearGrid');
    grid.style.setProperty('--cell', cs + 'px');
    grid.style.setProperty('--cgap', gap + 'px');

    const t = now(); t.setHours(0,0,0,0);
    grid.innerHTML = '';

    for (let i = 0; i < totalDays; i++) {
      const d = new Date(start.getTime() + i * 864e5);
      const cell = document.createElement('div');
      cell.className = 'year-cell';

      if (d.getFullYear() !== viewYear) {
        cell.style.background = 'transparent';
        cell.classList.add('no-click');
      } else if (d > t) {
        cell.style.background = 'rgba(255,255,255,0.04)';
        cell.classList.add('no-click');
      } else {
        const isDone = (log[dkey(d.getFullYear(), d.getMonth(), d.getDate())] || []).includes(habit.id);
        const isToday = d.getTime() === t.getTime();

        if (isDone) {
          cell.style.background = habit.color;
          cell.style.opacity = isToday ? '1' : '0.85';
        } else {
          cell.style.background = isToday
            ? 'rgba(255,255,255,0.12)'
            : 'rgba(255,255,255,0.06)';
        }

        if (isToday) {
          cell.style.outline = `1.5px solid ${habit.color}`;
          cell.style.outlineOffset = '1px';
        }

        const dc = new Date(d);
        cell.addEventListener('click', () => toggleCell(habit.id, dc));
      }

      grid.appendChild(cell);
    }

    // Month labels
    const monthRow = document.getElementById('yearMonthRow');
    monthRow.innerHTML = '';
    for (let m = 0; m < 12; m++) {
      const firstOfMonth = new Date(viewYear, m, 1);
      if (firstOfMonth < start) continue;
      const dayOff = Math.round((firstOfMonth - start) / 864e5);
      const col = Math.floor(dayOff / 7);
      const left = col * (cs + gap);
      const lbl = document.createElement('span');
      lbl.className = 'year-month-lbl';
      lbl.style.left = left + 'px';
      lbl.textContent = MO[m];
      monthRow.appendChild(lbl);
    }
  }

  function renderStats(habit, log) {
    const completions = calcYearCompletions(habit.id, log, viewYear);
    const streak = calcStreak(habit.id, log);
    const best = calcBestStreak(habit.id, log);
    document.getElementById('statCompletions').textContent = completions;
    document.getElementById('statCompletions').style.color = habit.color;
    document.getElementById('statStreak').textContent = streak;
    document.getElementById('statBest').textContent = best;
  }

  function renderChart(habit, log) {
    const data = calcMonthlyData(habit.id, log, viewYear);
    const valid = data.filter(v => v !== null);
    const max = Math.max(...valid, 1);
    const W = 300, H = 60;
    const pts = [];
    const moLabels = [];

    data.forEach((v, i) => {
      if (v === null) return;
      const x = (i / 11) * W;
      const y = H - (v / max) * H * 0.88 - H * 0.06;
      pts.push([x, y]);
      moLabels.push(MO[i].slice(0,3));
    });

    const wrap = document.getElementById('chartSvgWrap');
    if (pts.length < 2) {
      wrap.innerHTML = `<div style="height:60px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-4)">NO DATA FOR ${viewYear}</div>`;
      document.getElementById('chartMonthRow').innerHTML = '';
      return;
    }

    // Smooth bezier path
    let linePath = `M ${pts[0][0]},${pts[0][1]}`;
    for (let i = 0; i < pts.length - 1; i++) {
      const p0 = pts[Math.max(0, i - 1)];
      const p1 = pts[i];
      const p2 = pts[i + 1];
      const p3 = pts[Math.min(pts.length - 1, i + 2)];
      const cp1x = p1[0] + (p2[0] - p0[0]) / 5;
      const cp1y = p1[1] + (p2[1] - p0[1]) / 5;
      const cp2x = p2[0] - (p3[0] - p1[0]) / 5;
      const cp2y = p2[1] - (p3[1] - p1[1]) / 5;
      linePath += ` C ${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
    }
    const lastPt = pts[pts.length - 1];
    const areaPath = linePath + ` L ${lastPt[0]},${H} L ${pts[0][0]},${H} Z`;

    const c = habit.color;
    wrap.innerHTML = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:64px">
      <defs>
        <linearGradient id="cg_${habit.id}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${c}" stop-opacity="0.45"/>
          <stop offset="100%" stop-color="${c}" stop-opacity="0.02"/>
        </linearGradient>
      </defs>
      <path d="${areaPath}" fill="url(#cg_${habit.id})"/>
      <path d="${linePath}" fill="none" stroke="${c}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>`;

    const row = document.getElementById('chartMonthRow');
    row.innerHTML = '';
    moLabels.forEach(m => {
      const s = document.createElement('span');
      s.className = 'chart-month-lbl';
      s.textContent = m;
      row.appendChild(s);
    });
  }

  function esc(s) { return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  // ---- Modal ----
  function buildColorGrid(sel) {
    const g = document.getElementById('colorGrid');
    g.innerHTML = '';
    COLORS.forEach(c => {
      const sw = document.createElement('div');
      sw.className = 'color-swatch' + (c === sel ? ' selected' : '');
      sw.style.background = c;
      sw.addEventListener('click', () => {
        selectedColor = c;
        g.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('selected'));
        sw.classList.add('selected');
      });
      g.appendChild(sw);
    });
  }
  function openAdd() {
    editingId = null; selectedColor = COLORS[0];
    document.getElementById('habitModalTitle').textContent = 'NEW HABIT';
    document.getElementById('habitNameInput').value = '';
    document.getElementById('habitModalDelete').style.display = 'none';
    buildColorGrid(selectedColor); showModal();
  }
  function openEdit(habit) {
    editingId = habit.id; selectedColor = habit.color;
    document.getElementById('habitModalTitle').textContent = 'EDIT HABIT';
    document.getElementById('habitNameInput').value = habit.name;
    document.getElementById('habitModalDelete').style.display = 'block';
    buildColorGrid(selectedColor); showModal();
  }
  function showModal() {
    document.getElementById('habitModalBg').classList.add('show');
    document.body.classList.add('topbar-modal-open');
    setTimeout(() => document.getElementById('habitNameInput').focus(), 80);
  }
  function closeModal() {
    document.getElementById('habitModalBg').classList.remove('show');
    document.body.classList.remove('topbar-modal-open');
  }
  function saveModal() {
    const name = document.getElementById('habitNameInput').value.trim();
    if (!name) { document.getElementById('habitNameInput').focus(); return; }
    const habits = loadHabits();
    if (editingId) {
      const idx = habits.findIndex(h => h.id === editingId);
      if (idx >= 0) { habits[idx].name = name; habits[idx].color = selectedColor; }
    } else {
      const newH = { id: 'h_' + Date.now() + '_' + Math.random().toString(36).slice(2,5), name, color: selectedColor };
      habits.push(newH);
      selectedHabitId = newH.id;
    }
    saveHabits(habits); closeModal(); render();
  }
  function deleteHabit() {
    if (!editingId || !confirm('Delete this habit and all its data?')) return;
    const habits = loadHabits().filter(h => h.id !== editingId);
    const log = loadLog();
    Object.keys(log).forEach(k => {
      log[k] = (log[k] || []).filter(id => id !== editingId);
      if (!log[k].length) delete log[k];
    });
    saveHabits(habits); saveLog(log);
    if (selectedHabitId === editingId) selectedHabitId = habits[0] ? habits[0].id : null;
    closeModal(); render();
  }

  // ---- Init ----
  function init() {
    viewYear = now().getFullYear();
    render();

    document.getElementById('markDoneBtn').addEventListener('click', () => {
      const habits = loadHabits();
      const habit = habits.find(h => h.id === selectedHabitId);
      if (!habit) return;
      toggleCell(habit.id, now());
    });

    document.getElementById('prevYearBtn').addEventListener('click', () => { viewYear--; renderDetail(); });
    document.getElementById('nextYearBtn').addEventListener('click', () => { viewYear++; renderDetail(); });
    document.getElementById('addHabitBtn').addEventListener('click', openAdd);
    document.getElementById('habitModalCancel').addEventListener('click', closeModal);
    document.getElementById('habitModalSave').addEventListener('click', saveModal);
    document.getElementById('habitModalDelete').addEventListener('click', deleteHabit);
    document.getElementById('habitModalBg').addEventListener('click', e => {
      if (e.target === document.getElementById('habitModalBg')) closeModal();
    });
    document.getElementById('habitNameInput').addEventListener('keydown', e => { if (e.key === 'Enter') saveModal(); });
    window.addEventListener('resize', () => { const h = loadHabits().find(h => h.id === selectedHabitId); if (h) renderYearGrid(h, loadLog()); });

    if (window.initCloudSync) {
      initCloudSync({ appKey: 'habits', syncedKeys: ['habits_list','habits_log'], onApplied: render });
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init, { once: true });
  } else { init(); }
})();
</script>
