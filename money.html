<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0B0E">
<meta name="color-scheme" content="dark">
<title>Money — Sunpath</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Spline+Sans+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sunpath.css">
<script src="sunpath.js" defer></script>
</head>
<body>
<div class="shellwrap">
  <div class="daterow" id="spDaterow"></div>

  <div class="pagehead">
    <h1 id="spHead">Money<em>.</em></h1>
    <div class="sub" id="spSub"></div>
  </div>

  <div class="section">
    <a class="glassy card" href="finance.html" id="spNw"></a>
  </div>

  <div class="section" id="spSubsSec" style="display:none">
    <div class="sec-head">Subscriptions<span class="more num" id="spSubsLbl"></span></div>
    <div class="glassy card"><div class="rows" id="spSubs"></div></div>
  </div>

  <div class="section">
    <a class="glassy card" href="finance.html" style="display:flex;align-items:center;gap:11px">
      <span class="ic" style="width:30px;height:30px;border-radius:10px;background:rgba(242,166,90,0.13);display:flex;align-items:center;justify-content:center">📊</span>
      <span style="flex:1"><span style="display:block;font-weight:600;font-size:13.5px">Open Finance</span>
      <span style="display:block;color:var(--muted);font-size:11px;margin-top:2px;font-weight:400">accounts, wishlist, orders &amp; full history</span></span>
      <span class="end act num" style="font-family:var(--mono);font-size:10.5px">→</span>
    </a>
  </div>
</div>

<script>
(function () {
  'use strict';
  function boot() {
    const S = window.Sunpath;
    if (!S) return;

    function render() {
      S.fillDaterow('MONEY');
      const M = S.money();
      const subs = S.subsList();

      if (M) {
        const pct = M.hist.length > 1 && (M.last.v - M.delta30) !== 0
          ? (M.delta30 / Math.abs(M.last.v - M.delta30)) * 100 : 0;
        document.getElementById('spHead').innerHTML = M.delta30 >= 0
          ? 'Quietly<br><em>compounding.</em>'
          : 'Down a little —<br>zoom <em>out.</em>';
        document.getElementById('spSub').innerHTML = 'Net worth ' +
          (M.delta30 >= 0 ? 'up <b>' : 'down <b class="warm">') +
          Math.abs(pct).toFixed(1) + '%</b> past 30 days.';
        const vals = M.hist.slice(-40).map(e => e.v);
        const path = S.sparkPath(vals, 320, 40);
        document.getElementById('spNw').innerHTML =
          '<span class="k">Net worth</span>' +
          '<div class="bigv num">' + Math.round(M.last.v).toLocaleString() + ' <small>SGD</small></div>' +
          '<div class="trend"><b' + (M.delta30 >= 0 ? '' : ' class="warm"') + '>' +
          (M.delta30 >= 0 ? '+' : '') + Math.round(M.delta30).toLocaleString() +
          '</b> past 30 days · updated ' + S.fmtShort(M.last.t) + '</div>' +
          (path ? '<div class="spark" style="margin-top:12px"><svg viewBox="0 0 320 40"><path d="' + path + '" fill="none" stroke="#F2A65A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>' : '');
      } else {
        document.getElementById('spHead').innerHTML = 'Money<em>.</em>';
        document.getElementById('spSub').textContent = 'No snapshots yet — open Finance to start tracking.';
        document.getElementById('spNw').innerHTML =
          '<span class="k">Net worth</span>' +
          '<div class="bigv num">— <small>SGD</small></div>' +
          '<div class="trend">tap to set up your accounts</div>';
      }

      const sec = document.getElementById('spSubsSec');
      const priced = subs.filter(s => s.price != null);
      if (subs.length) {
        sec.style.display = '';
        const total = priced.reduce((t, s) => t + s.price, 0);
        document.getElementById('spSubsLbl').textContent =
          priced.length ? 'SGD ' + total.toFixed(2) + ' / MO' : subs.length + ' TRACKED';
        document.getElementById('spSubs').innerHTML = subs.slice(0, 5).map(s =>
          '<a class="rowi" href="finance.html"><span class="ic">↻</span>' +
          '<span class="tx"><span class="t1">' + S.esc(s.name) + '</span></span>' +
          '<span class="end num">' + (s.price != null ? s.price.toFixed(2) : '—') + '</span></a>'
        ).join('');
      } else { sec.style.display = 'none'; }
    }

    S.injectDock('money');
    render();
    S.pull({
      'goals':   { keys: ['goal_streak_v1'] },
      'finance': { keys: ['nw:history', 'subs'] }
    }, render);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot, { once: true });
  } else { boot(); }
})();
</script>
</body>
</html>
