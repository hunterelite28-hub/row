<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0B0E">
<meta name="color-scheme" content="dark">
<title>Money — Sunpath</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Spline+Sans+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sunpath.css">
<script src="sunpath.js" defer></script>
<script src="sync.js" defer></script>
<style>
@media (min-width: 1024px) {
  .money-page .shellwrap { max-width: 1100px; }
}
</style>
</head>
<body class="money-page">
<div class="shellwrap">
  <div class="daterow" id="spDaterow"></div>

  <div class="pagehead">
    <h1 id="spHead">Money<em>.</em></h1>
    <div class="sub" id="spSub"></div>
  </div>

  <!-- FINANCE-SUBNAV-AND-TILES -->
</div>

<script>
(function () {
  'use strict';
  function boot() {
    const S = window.Sunpath;
    if (!S) return;
    S.fillDaterow('MONEY');
    S.injectDock('money');
    S.pull({ 'goals': { keys: ['goal_streak_v1'] } }, function () {});
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot, { once: true });
  } else { boot(); }
})();
</script>
</body>
</html>
